name: Build & Release ClassWidgets-2

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true
        default: '2.0.0.dev31546377'
        type: string
      version_type:
        description: 'Type'
        required: true
        default: 'alpha'
        type: choice
        options:
          - alpha
          - beta
          - stable
      upload2webdav:
        description: 'Upload to...'
        required: true
        default: 'None'
        type: choice
        options:
          - None
          - 123Pan
          - OneDrive
          - Both
      release:
        description: 'Create GitHub Release'
        required: true
        default: false
        type: boolean
      prerelease:
        description: 'Mark as Pre-release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-15-intel, macos-latest]

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 📦 Set up Python & Install uv
        uses: astral-sh/setup-uv@v6

      - name: 🏷️ Resolve build version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            VERSION_TYPE="${{ inputs.version_type }}"
            VERSION_TAG="v${VERSION}"
          else
            VERSION_TAG="${{ github.ref_name }}"
            VERSION="${VERSION_TAG#v}"
            VERSION_TYPE="stable"

            if [[ "$VERSION" =~ (^|[-._])alpha([-.0-9]*)?$ ]]; then
              VERSION_TYPE="alpha"
              VERSION="${VERSION%%-alpha*}"
              VERSION="${VERSION%%.alpha*}"
              VERSION="${VERSION%%_alpha*}"
            elif [[ "$VERSION" =~ (^|[-._])beta([-.0-9]*)?$ ]]; then
              VERSION_TYPE="beta"
              VERSION="${VERSION%%-beta*}"
              VERSION="${VERSION%%.beta*}"
              VERSION="${VERSION%%_beta*}"
            fi
          fi

          if [[ ! "$VERSION_TYPE" =~ ^(alpha|beta|stable)$ ]]; then
            echo "Invalid version_type: $VERSION_TYPE" >&2
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9][0-9A-Za-z.+_-]*$ ]]; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi

          PRERELEASE="true"
          if [[ "$VERSION_TYPE" == "stable" ]]; then
            PRERELEASE="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_type=$VERSION_TYPE" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

          echo "Resolved version: $VERSION"
          echo "Resolved version type: $VERSION_TYPE"
          echo "Resolved version tag: $VERSION_TAG"

      - name: 📝 Write version to source
        shell: bash
        env:
          CW_VERSION: ${{ steps.version.outputs.version }}
          CW_VERSION_TYPE: ${{ steps.version.outputs.version_type }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path('src/__init__.py')
          content = path.read_text(encoding='utf-8')
          content = re.sub(r'__version__ = ["\'][^"\']*["\']', f'__version__ = "{os.environ["CW_VERSION"]}"', content)
          content = re.sub(r'__version_type__ = ["\'][^"\']*["\']', f'__version_type__ = "{os.environ["CW_VERSION_TYPE"]}"', content)
          path.write_text(content, encoding='utf-8')
          PY

          grep -E '^__version__|^__version_type__' src/__init__.py

      - name: 📦 Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ github.workflow }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ github.workflow }}-

      - name: 📦 Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: 🔨 Build ClassWidgets-2 (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          uv run pyinstaller --noconsole \
            --icon "assets/images/logo.ico" \
            --add-data "src/qml:src/qml" \
            --add-data "src/plugins:src/plugins" \
            --add-data "src/themes:src/themes" \
            --add-data "assets:assets" \
            --add-data "LICENSE:." \
            --paths=. \
            --contents-directory . \
            --name="Class Widgets 2" \
            src/app.py

      - name: 🔨 Build ClassWidgets-2 (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          uv run pyinstaller --noconsole \
            --icon "assets/images/logo.icns" \
            --add-data "src/qml:src/qml" \
            --add-data "src/plugins:src/plugins" \
            --add-data "src/themes:src/themes" \
            --add-data "assets:assets" \
            --add-data "LICENSE:." \
            --paths=. \
            --contents-directory . \
            --name="Class Widgets 2" \
            src/app.py

      - name: 📦 Zip build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Class Widgets 2/*" -DestinationPath "dist/ClassWidgets-2-Windows.zip"

      - name: 📦 Zip build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          hdiutil create -volname "Class Widgets 2" -srcfolder dist -ov -format UDZO ClassWidgets-2-macOS-${{ runner.arch }}.dmg
        # ditto -c -k --sequesterRsrc --keepParent "Class Widgets 2".app ClassWidgets-2-macOS-${{ runner.arch }}.zip

      - name: ☁️ Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ClassWidgets-2-Windows
          path: dist/ClassWidgets-2-Windows.zip

      - name: ☁️ Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ClassWidgets-2-macOS-${{ runner.arch }}
          path: ClassWidgets-2-macOS-${{ runner.arch }}.dmg

  release:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🏷️ Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            VERSION_TYPE="${{ inputs.version_type }}"
            VERSION_TAG="v${VERSION}"
          else
            VERSION_TAG="${{ github.ref_name }}"
            VERSION="${VERSION_TAG#v}"
            VERSION_TYPE="stable"

            if [[ "$VERSION" =~ (^|[-._])alpha([-.0-9]*)?$ ]]; then
              VERSION_TYPE="alpha"
              VERSION="${VERSION%%-alpha*}"
              VERSION="${VERSION%%.alpha*}"
              VERSION="${VERSION%%_alpha*}"
            elif [[ "$VERSION" =~ (^|[-._])beta([-.0-9]*)?$ ]]; then
              VERSION_TYPE="beta"
              VERSION="${VERSION%%-beta*}"
              VERSION="${VERSION%%.beta*}"
              VERSION="${VERSION%%_beta*}"
            fi
          fi

          PRERELEASE="true"
          if [[ "$VERSION_TYPE" == "stable" ]]; then
            PRERELEASE="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_type=$VERSION_TYPE" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: ⬇️ Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist/
          merge-multiple: true

      - name: 🧱 Set up git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: 📜 Generate CHANGELOG.md
        run: |
          git cliff --latest --tag "${{ steps.version.outputs.version_tag }}" --config .git-cliff.toml > CHANGELOG.md

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        # 推送/手动+发布 ==> 发布
        if: ${{  github.event_name == 'push' || github.event.inputs.release == 'true' }}
        with:
          name: Class Widgets ${{ steps.version.outputs.version_tag }}
          tag_name: ${{ steps.version.outputs.version_tag }}
          body_path: CHANGELOG.md
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            dist/ClassWidgets-2-Windows.zip
            dist/ClassWidgets-2-macOS-X64.dmg
            dist/ClassWidgets-2-macOS-ARM64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}     

      - name: 📤 Upload CHANGELOG & packages to 123Pan
        # 推送/手动+上传 ==> 上传
        if: success() && 
          ( github.event_name == 'push' ||
           github.event.inputs.upload2webdav == '123Pan' ||
           github.event.inputs.upload2webdav == 'Both')
        run: |
          VERSION="${{ steps.version.outputs.version_tag }}"
          ENCODED_VERSION=$(echo "$VERSION" | sed 's/ /%20/g')

          # Create directory
          curl -v -u "${{ secrets.PAN_USER }}:${{ secrets.PAN_PASS }}" \
               -X MKCOL "https://webdav.123pan.cn/webdav/${ENCODED_VERSION}"

          # Upload files
          curl -u "${{ secrets.PAN_USER }}:${{ secrets.PAN_PASS }}" \
            -T "CHANGELOG.md" \
            "https://webdav.123pan.cn/webdav/${ENCODED_VERSION}/CHANGELOG.md"

          curl -u "${{ secrets.PAN_USER }}:${{ secrets.PAN_PASS }}" \
            -T "dist/ClassWidgets-2-Windows.zip" \
            "https://webdav.123pan.cn/webdav/${ENCODED_VERSION}/ClassWidgets-2-Windows.zip"

          curl -u "${{ secrets.PAN_USER }}:${{ secrets.PAN_PASS }}" \
            -T "dist/ClassWidgets-2-macOS-X64.dmg" \
            "https://webdav.123pan.cn/webdav/${ENCODED_VERSION}/ClassWidgets-2-macOS-X64.dmg"
          curl -u "${{ secrets.PAN_USER }}:${{ secrets.PAN_PASS }}" \
            -T "dist/ClassWidgets-2-macOS-ARM64.dmg" \
            "https://webdav.123pan.cn/webdav/${ENCODED_VERSION}/ClassWidgets-2-macOS-ARM64.dmg"

      - name: 🔔 Trigger Official Website Update
        if: success()
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.ORG_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Class-Widgets/official_website/dispatches \
            -d '{"event_type": "update-version"}'

      - name: 📤 Upload CHANGELOG & packages to OneDrive
        if: success() &&
          (github.event_name == 'push' ||
          github.event.inputs.upload2webdav == 'OneDrive' ||
          github.event.inputs.upload2webdav == 'Both')
        run: |
          VERSION="${{ steps.version.outputs.version_tag }}"
          ENCODED_VERSION=$(echo "$VERSION" | sed 's/ /%20/g')

          # Create directory
          curl -v -u "${{ secrets.ONEDRIVE_USER }}:${{ secrets.ONEDRIVE_PASS }}" \
               -X MKCOL "https://app.koofr.net/dav/1Drv/Class-Widgets/${ENCODED_VERSION}"

          # Upload files
          curl -u "${{ secrets.ONEDRIVE_USER }}:${{ secrets.ONEDRIVE_PASS }}" \
            -T "CHANGELOG.md" \
            "https://app.koofr.net/dav/1Drv/Class-Widgets/${ENCODED_VERSION}/CHANGELOG.md"

          curl -u "${{ secrets.ONEDRIVE_USER }}:${{ secrets.ONEDRIVE_PASS }}" \
            -T "dist/ClassWidgets-2-Windows.zip" \
            "https://app.koofr.net/dav/1Drv/Class-Widgets/${ENCODED_VERSION}/ClassWidgets-2-Windows.zip"

          curl -u "${{ secrets.ONEDRIVE_USER }}:${{ secrets.ONEDRIVE_PASS }}" \
            -T "dist/ClassWidgets-2-macOS-X64.dmg" \
            "https://app.koofr.net/dav/1Drv/Class-Widgets/${ENCODED_VERSION}/ClassWidgets-2-macOS-X64.dmg"
          curl -u "${{ secrets.ONEDRIVE_USER }}:${{ secrets.ONEDRIVE_PASS }}" \
            -T "dist/ClassWidgets-2-macOS-ARM64.dmg" \
            "https://app.koofr.net/dav/1Drv/Class-Widgets/${ENCODED_VERSION}/ClassWidgets-2-macOS-ARM64.dmg"
